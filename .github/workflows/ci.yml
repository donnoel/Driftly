name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.scheme }}
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme: Driftly
            platform: iOS
            simulator_family: iPhone
            deployment_flag: IPHONEOS_DEPLOYMENT_TARGET
            deployment_target: "26.4"
          - scheme: DriftlyTV
            platform: tvOS
            simulator_family: Apple TV
            deployment_flag: TVOS_DEPLOYMENT_TARGET
            deployment_target: "26.4"
    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData/${{ matrix.scheme }}
      RESULT_BUNDLE: ${{ github.workspace }}/TestResults/${{ matrix.scheme }}.xcresult
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 26.4.1

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Driftly.xcodeproj

      - name: Show environment
        run: |
          xcode-select -p
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devicetypes
          xcodebuild -project Driftly.xcodeproj -scheme '${{ matrix.scheme }}' -showdestinations

      - name: Prepare simulator
        id: simulator
        env:
          PLATFORM: ${{ matrix.platform }}
          SIMULATOR_FAMILY: ${{ matrix.simulator_family }}
        run: |
          set -euo pipefail
          SIMULATOR_ID="$(python3 <<'PY'
          import json
          import os
          import subprocess

          platform = os.environ["PLATFORM"]
          simulator_family = os.environ["SIMULATOR_FAMILY"]

          runtimes = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "--json"])
          )["runtimes"]
          platform_runtimes = [
              runtime for runtime in runtimes
              if runtime.get("platform") == platform and runtime.get("isAvailable")
          ]
          if not platform_runtimes:
              raise SystemExit(f"No available {platform} simulator runtimes.")

          def version_key(runtime):
              parts = []
              for part in runtime.get("version", "0").split("."):
                  try:
                      parts.append(int(part))
                  except ValueError:
                      break
              return tuple(parts)

          runtime_identifier = sorted(platform_runtimes, key=version_key)[-1]["identifier"]

          device_types = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "--json"])
          )["devicetypes"]
          compatible_types = [
              device_type for device_type in device_types
              if device_type.get("name", "").startswith(simulator_family)
          ]
          if not compatible_types:
              raise SystemExit(f"No {simulator_family} simulator device types.")

          preferred_names = {
              "iPhone": [
                  "iPhone 17 Pro",
                  "iPhone 17",
                  "iPhone 16 Pro",
                  "iPhone 16",
                  "iPhone SE (3rd generation)",
              ],
              "Apple TV": [
                  "Apple TV 4K (3rd generation)",
                  "Apple TV 4K (2nd generation)",
                  "Apple TV",
              ],
          }[simulator_family]

          selected_device = next(
              (
                  device_type for preferred_name in preferred_names
                  for device_type in compatible_types
                  if device_type.get("name") == preferred_name
              ),
              compatible_types[-1],
          )

          simulator_id = subprocess.check_output(
              [
                  "xcrun",
                  "simctl",
                  "create",
                  f"CI {simulator_family}",
                  selected_device["identifier"],
                  runtime_identifier,
              ],
              text=True,
          ).strip()
          print(simulator_id)
          PY
          )"
          echo "id=${SIMULATOR_ID}" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "${SIMULATOR_ID}" || true
          xcrun simctl bootstatus "${SIMULATOR_ID}" -b

      - name: Build and test
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$RESULT_BUNDLE")"
          rm -rf "$RESULT_BUNDLE"
          xcodebuild \
            -project Driftly.xcodeproj \
            -scheme '${{ matrix.scheme }}' \
            -configuration Debug \
            -destination 'platform=${{ matrix.platform }} Simulator,id=${{ steps.simulator.outputs.id }}' \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            ${{ matrix.deployment_flag }}=${{ matrix.deployment_target }} \
            clean test

      - name: Upload xcodebuild artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-artifacts-${{ matrix.scheme }}
          path: |
            ${{ env.RESULT_BUNDLE }}
            ${{ env.DERIVED_DATA }}/Logs/Test
